server {
    listen 80;
    server_name sqssecurity.co.uk www.sqssecurity.co.uk;

    # Redirect HTTP to HTTPS (uncomment when SSL certificate is active)
    # return 301 https://$host$request_uri;

    # Direct static assets handling (Optional optimization)
    location /_astro/ {
        alias /home/shakil/sqs-ws/dist/client/_astro/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
